x-whoami: &whoami
  image: traefik/whoami
  command: ["--port", "8080"]
  restart: unless-stopped

services:
  whoami1:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.1"
        mac_address: "52:54:00:11:22:33"

  whoami2:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.2"
        mac_address: "52:54:00:44:55:66"

  whoami3:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.3"
        mac_address: "52:54:00:77:88:99"

  dataplane:
    build:
      context: .
      dockerfile: dataplane/Dockerfile
    privileged: true
    ipc: shareable
    ulimits:
      memlock: -1
    command:
      - "-l"
      - "0-1"
      - "-n"
      - "4"
      - "--no-huge"
      - "-m"
      - "512"
      - "--vdev"
      - "net_af_xdp0,iface=eth0,start_queue=0,queue_count=1"
    networks:
      lbnet:
        ipv4_address: "10.0.1.254"
        mac_address: "aa:bb:cc:dd:ee:ff"
    healthcheck:
      test: ["CMD-SHELL", "test -e /dev/shm/cerebellum_stats && test -e /dev/shm/cerebellum_control"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  controlplane:
    build:
      context: .
      dockerfile: controlplane/Dockerfile
    expose:
      - "8080"
    ipc: "service:dataplane"
    group_add:
      - "0"
    networks:
      lbnet:
        ipv4_address: "10.0.1.200"
    depends_on:
      dataplane:
        condition: service_healthy
    restart: unless-stopped

  victoria:
    image: victoriametrics/victoria-metrics:latest
    command: ["-retentionPeriod=7d"]
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - vmdata:/victoria-metrics-data
    networks:
      lbnet:
        ipv4_address: "10.0.1.201"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_DEFAULT_THEME: "light"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      lbnet:
        ipv4_address: "10.0.1.202"
    depends_on:
      - victoria
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ui/Dockerfile
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lbnet
    depends_on:
      controlplane:
        condition: service_healthy
    restart: unless-stopped

networks:
  lbnet:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.1.0/24"
          gateway: "10.0.1.250"

volumes:
  vmdata:
  grafana-data:
