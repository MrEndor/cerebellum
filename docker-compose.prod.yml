x-whoami: &whoami
  image: traefik/whoami
  command: ["--port", "8080"]
  restart: unless-stopped

services:
  whoami1:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.1"
        mac_address: "52:54:00:11:22:33"

  whoami2:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.2"
        mac_address: "52:54:00:44:55:66"

  whoami3:
    <<: *whoami
    networks:
      lbnet:
        ipv4_address: "10.0.1.3"
        mac_address: "52:54:00:77:88:99"

  dataplane:
    image: "${IMAGE_PREFIX:-ghcr.io/OWNER/cerebellum}-dataplane:${IMAGE_TAG:-latest}"
    privileged: true
    ipc: shareable
    ulimits:
      memlock: -1
    command:
      - "-l"
      - "${DATAPLANE_LCORES:-0-1}"
      - "-n"
      - "4"
      - "--no-huge"
      - "-m"
      - "512"
      - "--vdev"
      - "net_af_xdp0,iface=${CEREBELLUM_IFACE:-eth0},start_queue=0,queue_count=1"
    networks:
      lbnet:
        ipv4_address: "10.0.1.254"
        mac_address: "aa:bb:cc:dd:ee:ff"
    healthcheck:
      test: ["CMD-SHELL", "test -e /dev/shm/cerebellum_stats && test -e /dev/shm/cerebellum_control"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  controlplane:
    image: "${IMAGE_PREFIX:-ghcr.io/OWNER/cerebellum}-controlplane:${IMAGE_TAG:-latest}"
    expose:
      - "8080"
    ipc: "service:dataplane"
    group_add:
      - "0"
    networks:
      lbnet:
        ipv4_address: "10.0.1.200"
    depends_on:
      dataplane:
        condition: service_healthy
    restart: unless-stopped

  victoria:
    image: victoriametrics/victoria-metrics:latest
    command: ["-retentionPeriod=7d"]
    volumes:
      - vmdata:/victoria-metrics-data
    networks:
      lbnet:
        ipv4_address: "10.0.1.201"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: "light"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      lbnet:
        ipv4_address: "10.0.1.202"
    depends_on:
      - victoria
    restart: unless-stopped

  nginx:
    image: "${IMAGE_PREFIX:-ghcr.io/OWNER/cerebellum}-nginx:${IMAGE_TAG:-latest}"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      TLS_CERT: "${TLS_CERT:-/etc/nginx/certs/fullchain.pem}"
      TLS_KEY: "${TLS_KEY:-/etc/nginx/certs/privkey.pem}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro"
    networks:
      - lbnet
    depends_on:
      controlplane:
        condition: service_healthy
    restart: unless-stopped

networks:
  lbnet:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.1.0/24"
          gateway: "10.0.1.250"

volumes:
  vmdata:
  grafana-data:
